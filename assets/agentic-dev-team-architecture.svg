<svg xmlns="http://www.w3.org/2000/svg" width="760" height="310" viewBox="0 0 760 310">
<style>
  svg { background:#f9f9f9; font-family: Inter, Arial, "Noto Sans TC", sans-serif; }
  .title { font-size:22px; font-weight:700; fill:#111; }
  .subtitle { font-size:12px; fill:#444; }
  .section { font-size:14px; font-weight:700; fill:#111; letter-spacing:.02em; }
  .box-title { font-size:14px; font-weight:700; fill:#111; }
  .box-text { font-size:11px; fill:#333; }
  .lane { fill:#f1f3f4; stroke:#c4c7c7; stroke-width:1; }
  .arrow { stroke:#46617c; stroke-width:2; marker-end:url(#arrowhead); }
  .arrow-label { font-size:11px; fill:#46617c; font-weight:600; }
</style>
<defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#46617c"/></marker></defs>
<text x="24" y="36" class="title">Agentic 開發團隊架構圖</text>
<text x="24" y="60" class="subtitle">角色能力放在 shared_agents；專案狀態、輸出與記憶放在 project_workspace。</text>
<rect x="24" y="86" width="320" height="184" rx="16" class="lane"/>
<text x="44" y="116" class="section">Shared Agents：可重用角色能力</text>
<rect x="44" y="138" width="130" height="48" rx="9" fill="#fff" stroke="#1a1c1c" stroke-width="1.3"/>
<text x="56" y="160" class="box-title">PM Bot</text><text x="56" y="178" class="box-text">SPEC、Story、Gate</text>
<rect x="194" y="138" width="130" height="48" rx="9" fill="#fff" stroke="#1a1c1c" stroke-width="1.3"/>
<text x="206" y="160" class="box-title">RD Bot</text><text x="206" y="178" class="box-text">Code、EVT、PR</text>
<rect x="44" y="202" width="130" height="48" rx="9" fill="#fff" stroke="#1a1c1c" stroke-width="1.3"/>
<text x="56" y="224" class="box-title">QA Bot</text><text x="56" y="242" class="box-text">Review、Test、Gate</text>
<rect x="194" y="202" width="130" height="48" rx="9" fill="#fff" stroke="#1a1c1c" stroke-width="1.3"/>
<text x="206" y="224" class="box-title">Security</text><text x="206" y="242" class="box-text">SAST、CVE、Report</text>
<line x1="344" y1="178" x2="414" y2="178" class="arrow"/>
<text x="379" y="164" text-anchor="middle" class="arrow-label">套用到專案</text>
<rect x="414" y="86" width="322" height="184" rx="16" class="lane"/>
<text x="434" y="116" class="section">Project Workspace：專案狀態與輸出</text>
<rect x="434" y="138" width="130" height="48" rx="9" fill="#fff" stroke="#1a1c1c" stroke-width="1.3"/>
<text x="446" y="160" class="box-title">Memory</text><text x="446" y="178" class="box-text">anti-patterns、bugs</text>
<rect x="584" y="138" width="130" height="48" rx="9" fill="#fff" stroke="#1a1c1c" stroke-width="1.3"/>
<text x="596" y="160" class="box-title">Outputs</text><text x="596" y="178" class="box-text">SPEC、EVT、QA Report</text>
<rect x="434" y="202" width="130" height="48" rx="9" fill="#fff" stroke="#1a1c1c" stroke-width="1.3"/>
<text x="446" y="224" class="box-title">Repo / PR</text><text x="446" y="242" class="box-text">branch、evidence</text>
<rect x="584" y="202" width="130" height="48" rx="9" fill="#fff" stroke="#1a1c1c" stroke-width="1.3"/>
<text x="596" y="224" class="box-title">Heptabase</text><text x="596" y="242" class="box-text">提醒、決策、日記</text>
</svg>