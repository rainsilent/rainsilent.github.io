<svg xmlns="http://www.w3.org/2000/svg" width="960" height="330" viewBox="0 0 960 330">
<style>
  svg { background:#f9f9f9; font-family: Inter, Arial, "Noto Sans TC", sans-serif; }
  .title { font-size:24px; font-weight:700; fill:#111; }
  .subtitle { font-size:13px; fill:#444; }
  .section { font-size:15px; font-weight:700; fill:#111; letter-spacing:.03em; }
  .box-title { font-size:15px; font-weight:700; fill:#111; }
  .box-text { font-size:12px; fill:#333; }
  .lane { fill:#f1f3f4; stroke:#c4c7c7; stroke-width:1; }
  .arrow { stroke:#46617c; stroke-width:2.2; marker-end:url(#arrowhead); }
  .arrow-label { font-size:12px; fill:#46617c; font-weight:600; }
</style>
<defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#46617c"/></marker></defs>
<text x="40" y="42" class="title">Agentic 開發團隊架構圖</text>
<text x="40" y="68" class="subtitle">角色能力放在 shared_agents；專案狀態、輸出與記憶放在 project_workspace。</text>
<rect x="40" y="95" width="390" height="190" rx="18" class="lane"/>
<text x="65" y="128" class="section">Shared Agents：可重用角色能力</text>
<rect x="65" y="150" width="155" height="52" rx="10" fill="#fff" stroke="#1a1c1c" stroke-width="1.4"/>
<text x="78" y="174" class="box-title">PM Bot</text><text x="78" y="193" class="box-text">SPEC、Story、Gate</text>
<rect x="245" y="150" width="155" height="52" rx="10" fill="#fff" stroke="#1a1c1c" stroke-width="1.4"/>
<text x="258" y="174" class="box-title">RD Bot</text><text x="258" y="193" class="box-text">Code、EVT、PR</text>
<rect x="65" y="220" width="155" height="52" rx="10" fill="#fff" stroke="#1a1c1c" stroke-width="1.4"/>
<text x="78" y="244" class="box-title">QA Bot</text><text x="78" y="263" class="box-text">Review、Test、Gate</text>
<rect x="245" y="220" width="155" height="52" rx="10" fill="#fff" stroke="#1a1c1c" stroke-width="1.4"/>
<text x="258" y="244" class="box-title">Security</text><text x="258" y="263" class="box-text">SAST、CVE、Threat Model</text>
<line x1="430" y1="190" x2="525" y2="190" class="arrow"/>
<text x="478" y="176" text-anchor="middle" class="arrow-label">套用到專案</text>
<rect x="525" y="95" width="395" height="190" rx="18" class="lane"/>
<text x="550" y="128" class="section">Project Workspace：專案狀態與輸出</text>
<rect x="550" y="150" width="155" height="52" rx="10" fill="#fff" stroke="#1a1c1c" stroke-width="1.4"/>
<text x="563" y="174" class="box-title">Memory</text><text x="563" y="193" class="box-text">anti-patterns、regressions</text>
<rect x="730" y="150" width="155" height="52" rx="10" fill="#fff" stroke="#1a1c1c" stroke-width="1.4"/>
<text x="743" y="174" class="box-title">Outputs</text><text x="743" y="193" class="box-text">SPEC、EVT、QA Report</text>
<rect x="550" y="220" width="155" height="52" rx="10" fill="#fff" stroke="#1a1c1c" stroke-width="1.4"/>
<text x="563" y="244" class="box-title">Repo / PR</text><text x="563" y="263" class="box-text">branch、PR evidence</text>
<rect x="730" y="220" width="155" height="52" rx="10" fill="#fff" stroke="#1a1c1c" stroke-width="1.4"/>
<text x="743" y="244" class="box-title">Heptabase</text><text x="743" y="263" class="box-text">提醒、決策、日記紀錄</text>
</svg>